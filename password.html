<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Gate - EliteVote</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
    body { font-family: 'Outfit', sans-serif; }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-black dark:text-white transition-colors duration-300">
  <main class="min-h-screen flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">
      <div class="bg-white dark:bg-black rounded-3xl shadow-sm border border-slate-200 dark:border-white/10 px-6 py-8">
        <div class="text-center">
          <div class="mx-auto w-12 h-12 rounded-2xl bg-blue-600/10 flex items-center justify-center mb-4">
            <i data-lucide="lock" class="w-6 h-6 text-blue-600"></i>
          </div>
          <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Authentication Required</h2>
          <p class="text-slate-600 dark:text-zinc-300 mb-6 text-sm">
            HELLO WELCOME ELITEVOTE KINDLY ENTER SECRET PHASE TO PROCEED
          </p>
        </div>

        <div class="space-y-3">
          <input
            id="auth-gate-input"
            type="password"
            autocomplete="off"
            inputmode="text"
            placeholder="Enter secret phase"
            class="w-full bg-slate-50 dark:bg-zinc-950 border border-slate-200 dark:border-white/10 rounded-2xl p-4 text-base outline-none focus:ring-2 focus:ring-blue-500"
          />

          <div
            id="auth-gate-error"
            class="hidden text-red-600 text-sm text-center"
          >
            Incorrect secret phase. Please try again.
          </div>

          <button
            id="auth-gate-submit"
            class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-semibold transition flex items-center justify-center gap-2"
          >
            <span>Proceed</span>
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </button>

          <p id="auth-gate-status" class="text-center text-xs text-slate-500 dark:text-zinc-400 hidden">
            Unlocking...
          </p>
        </div>
      </div>

      <p class="text-center text-xs text-slate-500 dark:text-zinc-400 mt-4">
        This is a client-side password gate.
      </p>
    </div>
  </main>

  <script>
    // Set your secret phase here (same value used by other pages).
    // This is client-side only (not real security).
window.__ELITEVOTE_SECRET_PHASE__ = 'password12';
  </script>

  <script>
    (function () {
      const STORAGE_KEY = 'elitevote_unlocked_v1';
      const SECRET_PHASE = (typeof window !== 'undefined' && window.__ELITEVOTE_SECRET_PHASE__)
        ? String(window.__ELITEVOTE_SECRET_PHASE__)
        : 'change-me-secret-phase';

      const input = document.getElementById('auth-gate-input');
      const errorBox = document.getElementById('auth-gate-error');
      const submitBtn = document.getElementById('auth-gate-submit');
      const status = document.getElementById('auth-gate-status');

      function normalize(s) {
        return String(s ?? '').trim();
      }

      function isUnlocked() {
        try {
          return localStorage.getItem(STORAGE_KEY) === 'true';
        } catch {
          return false;
        }
      }

      function setUnlocked(value) {
        try {
          localStorage.setItem(STORAGE_KEY, value ? 'true' : 'false');
        } catch {
          // ignore
        }
      }

      function unlockAndRedirect() {
        const entered = normalize(input.value);
        const expected = normalize(SECRET_PHASE);

        if (!entered) {
          errorBox.classList.remove('hidden');
          return;
        }

        if (entered === expected) {
          setUnlocked(true);

          // Redirect to landing page.
          window.location.replace('index.html');
        } else {
          errorBox.classList.remove('hidden');
        }
      }

      submitBtn.addEventListener('click', () => {
        errorBox.classList.add('hidden');
        status.classList.remove('hidden');
        unlockAndRedirect();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          errorBox.classList.add('hidden');
          status.classList.remove('hidden');
          unlockAndRedirect();
        }
      });

      if (isUnlocked()) {
        window.location.replace('index.html');
      }

      // Focus on load
      setTimeout(() => input.focus(), 0);

      if (window.lucide && typeof window.lucide.createIcons === 'function') {
        window.lucide.createIcons();
      }
    })();
  </script>
</body>
</html>
